<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Universal File Viewer</title>
  <style>
    html,
    body,
    flyfish-file-viewer {
      width: 100%;
      height: 100%;
      margin: 0;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html.file-viewer-frame--presentation,
    html.file-viewer-frame--presentation body,
    html.file-viewer-frame--presentation flyfish-file-viewer,
    html.file-viewer-frame--presentation .file-viewer-web-shell {
      background: #eef3f8;
    }

    html.file-viewer-frame--presentation .file-viewer-web-shell {
      overflow: auto !important;
    }

    #error {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
      text-align: center;
      color: #172033;
      background: #fff;
    }

    #error[data-visible="true"] {
      display: flex;
    }
  </style>
</head>
<body>
  <flyfish-file-viewer id="viewer" style-isolation="none"></flyfish-file-viewer>
  <div id="error" role="alert"></div>
  <script id="file-viewer-flyfish-runtime" src="./file-viewer/flyfish-file-viewer-web-full.iife.js"></script>
  <script id="file-viewer-frame-runtime" src="./frame.js"></script>
</body>
</html>
