<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">File Viewer app icon</title>
  <desc id="desc">A central document with a magnifying glass, surrounded by eight upright document-format icons whose centers lie at exact 45-degree intervals on one circular orbit.</desc>

  <defs>
    <linearGradient id="tileGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b86d8"/>
      <stop offset="1" stop-color="#0067c3"/>
    </linearGradient>
    <linearGradient id="paperGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#dceeff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#004d91" flood-opacity="0.20"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#004d91" flood-opacity="0.16"/>
    </filter>

    <symbol id="smallDoc" viewBox="0 0 112 136">
      <path d="M14 0H72L112 40V122Q112 136 98 136H14Q0 136 0 122V14Q0 0 14 0Z" fill="url(#paperGradient)"/>
      <path d="M72 0V28Q72 40 84 40H112Z" fill="url(#foldGradient)"/>
    </symbol>

    <symbol id="largeDoc" viewBox="0 0 238 292">
      <path d="M20 0H170L238 68V272Q238 292 218 292H20Q0 292 0 272V20Q0 0 20 0Z" fill="url(#paperGradient)"/>
      <path d="M170 0V46Q170 68 192 68H238Z" fill="url(#foldGradient)"/>
    </symbol>
  </defs>

  <rect x="56" y="56" width="912" height="912" rx="154" fill="url(#tileGradient)"/>

  <!-- Shared center: (512, 512). Shared orbit radius: 330. -->
  <circle cx="512" cy="512" r="330" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 22.04" opacity="0.96"/>

  <!-- -90° — center (512, 182) -->
  <g transform="translate(456 114)" filter="url(#softShadow)">
    <use href="#smallDoc" width="112" height="136"/>
    <g fill="#0676ce">
      <circle cx="40" cy="44" r="11"/>
      <path d="M25 100 50 67 66 84 80 59 101 100Z"/>
    </g>
  </g>

  <!-- -45° — center (745.345238, 278.654762) -->
  <g transform="translate(689.345238 210.654762)" filter="url(#softShadow)">
    <use href="#smallDoc" width="112" height="136"/>
    <path d="M42 48Q42 41 48 45L86 67Q92 71 86 75L48 97Q42 101 42 94Z" fill="#0676ce"/>
  </g>

  <!-- 0° — center (842, 512) -->
  <g transform="translate(786 444)" filter="url(#softShadow)">
    <use href="#smallDoc" width="112" height="136"/>
    <g fill="#0676ce">
      <rect x="27" y="58" width="60" height="8" rx="4"/>
      <rect x="27" y="80" width="60" height="8" rx="4"/>
      <rect x="27" y="102" width="40" height="8" rx="4"/>
    </g>
  </g>

  <!-- 45° — center (745.345238, 745.345238) -->
  <g transform="translate(689.345238 677.345238)" filter="url(#softShadow)">
    <use href="#smallDoc" width="112" height="136"/>
    <g fill="#0676ce">
      <rect x="46" y="29" width="10" height="11" rx="2"/>
      <rect x="56" y="40" width="10" height="11" rx="2"/>
      <rect x="46" y="51" width="10" height="11" rx="2"/>
      <rect x="56" y="62" width="10" height="11" rx="2"/>
      <rect x="46" y="73" width="10" height="11" rx="2"/>
      <path d="M41 87H71Q77 87 77 93V112Q77 118 71 118H41Q35 118 35 112V93Q35 87 41 87Zm5 9V109H66V96Z"/>
    </g>
  </g>

  <!-- 90° — center (512, 842) -->
  <g transform="translate(456 774)" filter="url(#softShadow)">
    <use href="#smallDoc" width="112" height="136"/>
    <g fill="none" stroke="#0676ce" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M42 57 24 74 42 91"/>
      <path d="M70 57 88 74 70 91"/>
      <path d="M62 49 50 99"/>
    </g>
  </g>

  <!-- 135° — center (278.654762, 745.345238) -->
  <g transform="translate(222.654762 677.345238)" filter="url(#softShadow)">
    <use href="#smallDoc" width="112" height="136"/>
    <path d="M56 43V93C50 88 41 87 34 92 25 98 24 111 31 118 38 125 50 124 57 116 60 112 61 108 61 103V63L88 71V51Z" fill="#0676ce"/>
  </g>

  <!-- 180° — center (182, 512) -->
  <g transform="translate(126 444)" filter="url(#softShadow)">
    <use href="#smallDoc" width="112" height="136"/>
    <g fill="#0676ce">
      <path d="M55 49A32 32 0 1 0 87 81H55Z"/>
      <path d="M62 42V74H94A32 32 0 0 0 62 42Z"/>
    </g>
  </g>

  <!-- 225° — center (278.654762, 278.654762) -->
  <g transform="translate(222.654762 210.654762)" filter="url(#softShadow)">
    <use href="#smallDoc" width="112" height="136"/>
    <g fill="#0676ce">
      <rect x="25" y="48" width="25" height="25" rx="3"/>
      <rect x="62" y="48" width="25" height="25" rx="3"/>
      <rect x="25" y="85" width="25" height="25" rx="3"/>
      <rect x="62" y="85" width="25" height="25" rx="3"/>
    </g>
  </g>

  <!-- Center document: center (512, 512) -->
  <g transform="translate(393 366)" filter="url(#shadow)">
    <use href="#largeDoc" width="238" height="292"/>
    <g fill="none" stroke="#0676ce" stroke-width="17" stroke-linecap="round">
      <circle cx="107" cy="151" r="58"/>
      <path d="M149 193 193 237"/>
    </g>
  </g>
</svg>
