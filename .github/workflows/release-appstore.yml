name: Release appstore

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-appstore:
    name: Build and publish appstore release
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.2'
          coverage: none

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -eu
          app_version="$(php scripts/app-version.php get)"
          release_version="${RELEASE_TAG#v}"
          if [ "$app_version" != "$release_version" ]; then
            echo "Release tag ${RELEASE_TAG} does not match app version ${app_version}"
            exit 1
          fi

      - name: Build release artifact
        run: |
          make npm-deps
          ./node_modules/.bin/playwright install --with-deps chromium
          make dist

      - name: Resolve tarball metadata
        id: tarball
        run: |
          set -eu
          set -- build/artifacts/fileviewer-*.tar.gz
          if [ "$1" = "build/artifacts/fileviewer-*.tar.gz" ] || [ "$#" -ne 1 ]; then
            echo "Expected exactly one built tarball for fileviewer, got $#"
            exit 1
          fi
          artifact="$1"
          asset_name="$(basename "$artifact")"
          download_url="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/${asset_name}"
          {
            echo "path=${artifact}"
            echo "asset_name=${asset_name}"
            echo "download_url=${download_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload or verify tarball on GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          artifact="${{ steps.tarball.outputs.path }}"
          asset_name="${{ steps.tarball.outputs.asset_name }}"
          existing_dir="$(mktemp -d)"
          trap 'rm -rf "$existing_dir"' EXIT
          python3 scripts/compare-release-archives.py "$artifact" "$artifact"
          release_asset_names="$(gh release view "${{ github.event.release.tag_name }}" --json assets --jq '.assets[].name')"
          if printf '%s\n' "$release_asset_names" | grep -Fqx "$asset_name"; then
            gh release download "${{ github.event.release.tag_name }}" --pattern "$asset_name" --dir "$existing_dir"
            if ! python3 scripts/compare-release-archives.py "$artifact" "$existing_dir/$asset_name"; then
              echo "Release asset $asset_name already exists with different contents"
              exit 1
            fi
            echo "Release asset $asset_name already exists with identical contents"
          else
            gh release upload "${{ github.event.release.tag_name }}" "$artifact"
          fi

      - name: Push to Nextcloud appstore
        uses: R0Wi/nextcloud-appstore-push-action@ad2020a77eb694e8fe145d2ebd6bc21c246240fd # v1.0.5
        with:
          app_name: fileviewer
          appstore_token: ${{ secrets.NC_APPSTORE_TOKEN }}
          download_url: ${{ steps.tarball.outputs.download_url }}
          app_private_key: ${{ secrets.NC_APP_PRIVATE_KEY }}
          nightly: ${{ github.event.release.prerelease }}
